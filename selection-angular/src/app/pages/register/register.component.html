<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <h2 class="text-center mb-4">Create an Account</h2>

          <!-- Dynamic Error Alert -->
          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            
            <!-- Username Field -->
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input 
                type="text" 
                id="username" 
                class="form-control" 
                formControlName="username"
                [ngClass]="{ 'is-invalid': username?.invalid && username?.touched }"
                placeholder="Choose a username"
                autocomplete="username"
              >
              <div *ngIf="username?.invalid && username?.touched" class="invalid-feedback">
                <span *ngIf="username?.errors?.['required']">Username is required.</span>
                <span *ngIf="username?.errors?.['minlength']">Must be at least 3 characters.</span>
              </div>
            </div>

            <!-- Email Field -->
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input 
                type="email" 
                id="email" 
                class="form-control" 
                formControlName="email"
                [ngClass]="{ 'is-invalid': email?.invalid && email?.touched }"
                placeholder="name@example.com"
                autocomplete="email"
              >
              <div *ngIf="email?.invalid && email?.touched" class="invalid-feedback">
                <span *ngIf="email?.errors?.['required']">Email is required.</span>
                <span *ngIf="email?.errors?.['email']">Please enter a valid email address.</span>
              </div>
            </div>

            <!-- Password Field -->
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input 
                type="password" 
                id="password" 
                class="form-control" 
                formControlName="password"
                [ngClass]="{ 'is-invalid': password?.invalid && password?.touched }"
                placeholder="Create a password"
                autocomplete="new-password"
              >
              <div *ngIf="password?.invalid && password?.touched" class="invalid-feedback">
                <span *ngIf="password?.errors?.['required']">Password is required.</span>
                <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters.</span>
              </div>
            </div>

            <!-- Submit Button -->
            <button 
              type="submit" 
              class="btn btn-primary w-100 py-2 mt-2" 
              [disabled]="isLoading"
            >
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              {{ isLoading ? 'Creating Account...' : 'Register' }}
            </button>

          </form>

          <div class="text-center mt-4 text-muted">
            Already have an account? <a routerLink="/login" class="text-decoration-none">Sign in</a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
