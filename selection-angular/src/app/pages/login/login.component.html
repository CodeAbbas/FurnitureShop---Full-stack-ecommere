<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <h2 class="text-center mb-4">Welcome Back</h2>

          <!-- Dynamic Error Alert from AuthService -->
          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            
            <!-- Email Field -->
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input 
                type="email" 
                id="email" 
                class="form-control" 
                formControlName="email"
                [ngClass]="{ 'is-invalid': email?.invalid && email?.touched }"
                placeholder="name@example.com"
                autocomplete="email"
              >
              <!-- Bootstrap Validation Feedback -->
              <div *ngIf="email?.invalid && email?.touched" class="invalid-feedback">
                <span *ngIf="email?.errors?.['required']">Email is required.</span>
                <span *ngIf="email?.errors?.['email']">Please enter a valid email address.</span>
              </div>
            </div>

            <!-- Password Field -->
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input 
                type="password" 
                id="password" 
                class="form-control" 
                formControlName="password"
                [ngClass]="{ 'is-invalid': password?.invalid && password?.touched }"
                placeholder="Enter your password"
                autocomplete="current-password"
              >
              <div *ngIf="password?.invalid && password?.touched" class="invalid-feedback">
                <span *ngIf="password?.errors?.['required']">Password is required.</span>
                <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters.</span>
              </div>
            </div>

            <!-- Admin Toggle Switch (Pure Bootstrap) -->
            <div class="form-check form-switch mb-4">
              <input class="form-check-input" type="checkbox" id="adminToggle" formControlName="isAdmin">
              <label class="form-check-label text-muted" for="adminToggle">
                Login as Administrator
              </label>
            </div>

            <!-- Submit Button with Loading State UX -->
            <button 
              type="submit" 
              class="btn btn-primary w-100 py-2" 
              [disabled]="isLoading"
            >
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              {{ isLoading ? 'Signing in...' : 'Sign In' }}
            </button>

          </form>

          <div class="text-center mt-4 text-muted">
            Don't have an account? <a routerLink="/register" class="text-decoration-none">Register here</a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
